name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    env:
      TERMER_SIGN_IDENTITY: "Developer ID Application: Sushruth Sastry (5G2TDMV275)"
    steps:
      - uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          CERT: ${{ secrets.MACOS_CERTIFICATE }}
          CERT_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KPWD="$(openssl rand -base64 24)"
          echo "$CERT" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KPWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPWD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KPWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)

      - name: Build, sign, notarize, release
        env:
          GH_TOKEN: ${{ github.token }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          version="$GITHUB_REF_NAME"
          TERMER_VERSION="$version" Scripts/package.sh >/dev/null
          ditto -c -k --keepParent .build/Termer.app ".build/Termer-$version.zip"
          xcrun notarytool submit ".build/Termer-$version.zip" \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
          xcrun stapler staple .build/Termer.app
          ditto -c -k --keepParent .build/Termer.app ".build/Termer-$version.zip"
          gh release create "$version" ".build/Termer-$version.zip" Scripts/install.sh \
            --title "Termer $version" --notes "Termer $version"
